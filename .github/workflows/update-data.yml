name: Update Data

on:
  schedule:
    # 10:30 AM UTC = ~6:30 AM ET — after EIA publishes overnight prices
    - cron: "30 10 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the data commit back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch data
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/gas_prices.json \
                  public/data/crude_oil.json \
                  public/data/last_updated.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "data: daily auto-update $(date -u '+%Y-%m-%d')"

      - name: Push
        run: git push origin main
